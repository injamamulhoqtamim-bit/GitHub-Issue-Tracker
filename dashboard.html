<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="style/style.css">
</head>

<body class="dashboard-body">

<!-- NAVBAR SECTIONS -->

<nav class="navbar">

<div class="logo-area">
<img src="assets/github-logo.png">
<h2>GitHub Issues Tracker</h2>
</div>

<div class="nav-right">

<div class="search-box">
<img src="./assets/search.png" class="search-icon">
<input type="text" id="searchInput" placeholder="Search issues...">
</div>

<button class="new-btn" onclick="searchIssue()">Search</button>

</div>

</nav>


<!-- MAIN WRAPPER -->

<div class="main-wrapper">


<!-- TABS -->

<!-- TABS CARD section -->
<div class="tabs-card">
  <div class="tabs">
    <button class="tab active" onclick="filterIssues('all',this)">All</button>
    <button class="tab" onclick="filterIssues('open',this)">Open</button>
    <button class="tab" onclick="filterIssues('closed',this)">Closed</button>
  </div>
</div>



<!-- HEADER INFO section -->
<div class="issues-header-card">

  <div class="issues-header-left">

<!-- icon png section -->
    <div class="issue-icon">
      <img src="./assets/Aperture.png">
    </div>

    <div>
      <h3 id="issueCount">50 Issues</h3>
      <p>Track and manage your project issues</p>
    </div>

  </div>

  <div class="issues-header-right">
    <span class="legend open-dot"></span> Open
    <span class="legend closed-dot"></span> Closed
  </div>

</div>


<!-- LOADER -->

<div id="loader" class="loader"></div>


<!-- GRID -->

<section id="issues-container" class="issues-grid"></section>

</div>


<!-- MODAL -->

<div id="issueModal" class="modal">

<div class="modal-content modal-design">

<h2 id="modalTitle"></h2>

<div class="modal-meta">
<span id="modalStatus" class="status-open"></span>
<span id="modalAuthor"></span>
<span id="modalDate"></span>
</div>

<div id="modalLabels" class="labels"></div>

<p id="modalDescription" class="modal-desc"></p>

<div class="modal-info">

<div>
<p class="info-title">Assignee:</p>
<p id="modalAssignee" class="info-value"></p>
</div>

<div>
<p class="info-title">Priority:</p>
<span id="modalPriority"></span>
</div>

</div>

<div class="modal-footer">
<button onclick="closeModal()" class="modal-close-btn">Close</button>
</div>

</div>

</div>


<script src="js/app.js"></script>

</body>
</html>
