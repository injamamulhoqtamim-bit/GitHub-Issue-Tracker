<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="style/style.css">
</head>

<body class="login-body">

<div class="login-card">

    <!-- github logo section -->

<img src="./assets/github-logo.png" class="logo">

<h2>GitHub Issues Tracker</h2>
<p class="subtitle">Sign in to manage your issues</p>

<!-- user name section -->
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">

<p class="default">Default: admin</p>

<!-- password section -->
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">

<p class="default">Default: admin123</p>

<button onclick="login()" class="login-btn">Sign In</button>

<div class="divider">OR</div>

<!-- demo section -->
<div class="demo-box">
<p>Demo Credentials:</p>
<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>

<!-- js connection section -->

<script src="js/app.js"></script>

</body>
</html>
